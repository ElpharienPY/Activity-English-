    <style>
        /* =========================================
           VARIABLES & RESET
        ========================================= */
        :root {
            --bg-main: #0A0A0A;
            --psg-red: #E30613;
            --psg-blue: #004170;
            --text-light: #F5F5F5;
            --pitch-green: #0A3A1A;
            --font-title: 'Impact', 'Arial Black', sans-serif;
            --font-text: 'Arial', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background-color: var(--bg-main); color: var(--text-light); font-family: var(--font-text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* =========================================
           HEADER
        ========================================= */
        header { display: flex; justify-content: space-between; align-items: center; padding: 8px 25px; background: linear-gradient(to right, var(--bg-main), var(--psg-blue), var(--bg-main)); border-bottom: 2px solid var(--psg-red); height: 8vh; min-height: 55px; }
        .header-titles { display: flex; flex-direction: column; justify-content: center; }
        h1 { font-family: var(--font-title); color: var(--psg-red); font-size: 1.6rem; letter-spacing: 1px; text-transform: uppercase; text-shadow: 1px 1px 0px var(--bg-main), 2px 2px 0px rgba(0,0,0,0.5); }
        .subtitle { font-size: 0.85rem; font-style: italic; color: #ccc; }
        .header-controls { display: flex; align-items: center; gap: 15px; }
        #counter { font-family: var(--font-title); font-size: 1.3rem; background: rgba(0,0,0,0.5); padding: 5px 12px; border-radius: 6px; border: 1px solid var(--psg-blue); }
        #btn-reset { background-color: var(--psg-red); color: white; border: none; padding: 8px 16px; font-family: var(--font-title); font-size: 1rem; cursor: pointer; border-radius: 4px; transition: all 0.2s; text-transform: uppercase; }
        #btn-reset:hover { background-color: #ff1a27; transform: scale(1.05); }

        /* =========================================
           MAIN LAYOUT
        ========================================= */
        main { display: flex; height: 92vh; width: 100%; }
        .left-panel { width: 65%; position: relative; display: flex; justify-content: center; align-items: center; padding: 15px; }
        .right-panel { width: 35%; background: linear-gradient(135deg, #111 0%, #1a1a1a 100%); border-left: 2px solid #333; display: flex; flex-direction: column; padding: 15px; }

        /* =========================================
           TERRAIN DE FOOTBALL
        ========================================= */
        .pitch-wrapper { position: relative; width: 100%; max-width: 550px; height: 95%; background-color: var(--pitch-green); border: 2px solid rgba(255, 255, 255, 0.4); border-radius: 5px; }
        .pitch-line { position: absolute; background-color: rgba(255, 255, 255, 0.3); }
        .half-way-line { width: 100%; height: 2px; top: 50%; transform: translateY(-50%); }
        .penalty-box-bottom { width: 50%; height: 15%; bottom: 0; left: 25%; border: 2px solid rgba(255, 255, 255, 0.3); border-bottom: none; position: absolute; }
        .penalty-box-top { width: 50%; height: 15%; top: 0; left: 25%; border: 2px solid rgba(255, 255, 255, 0.3); border-top: none; position: absolute; }
        .six-yard-bottom { width: 20%; height: 5%; bottom: 0; left: 40%; border: 2px solid rgba(255, 255, 255, 0.3); border-bottom: none; position: absolute; }
        .six-yard-top { width: 20%; height: 5%; top: 0; left: 40%; border: 2px solid rgba(255, 255, 255, 0.3); border-top: none; position: absolute; }

        .drop-zone { position: absolute; width: 80px; height: 80px; border: 2px dashed rgba(255, 255, 255, 0.5); border-radius: 50%; display: flex; justify-content: center; align-items: center; transform: translate(-50%, -50%); transition: all 0.3s; z-index: 10; }
        .drop-zone::after { content: attr(data-label); position: absolute; bottom: -20px; font-family: var(--font-title); font-size: 0.9rem; color: rgba(255, 255, 255, 0.7); text-shadow: 1px 1px 2px black; }
        .drop-zone.active-target { border-color: var(--psg-red); background-color: rgba(227, 6, 19, 0.2); box-shadow: 0 0 10px var(--psg-red); animation: pulse 1.5s infinite; }
        .drop-zone.filled { border: none; background: transparent; box-shadow: none; animation: flash-red 0.5s ease-out; }
        .drop-zone.filled::after { display: none; }

        /* Coordonnées */
        #drop-GK  { bottom: 4%; left: 50%; }
        #drop-LB  { bottom: 22%; left: 18%; }
        #drop-LCB { bottom: 18%; left: 36%; }
        #drop-RCB { bottom: 18%; left: 64%; }
        #drop-RB  { bottom: 22%; left: 82%; }
        #drop-CDM { bottom: 38%; left: 50%; }
        #drop-LCM { bottom: 52%; left: 32%; }
        #drop-RCM { bottom: 52%; left: 68%; }
        #drop-LW  { top: 20%; left: 22%; }
        #drop-ST  { top: 14%; left: 50%; }
        #drop-RW  { top: 20%; left: 78%; }

        .coach-area { position: absolute; top: 15px; left: 15px; width: 90px; height: 110px; border: 2px dashed rgba(255,255,255,0.3); display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.4); border-radius: 8px; }
        .coach-area h3 { font-family: var(--font-title); color: #aaa; margin-bottom: 5px; font-size: 0.9rem; }
        #drop-COACH { position: relative; width: 60px; height: 60px; transform: none; }

        /* =========================================
           PANNEAU DROIT (SÉLECTION)
        ========================================= */
        .role-title-container { text-align: center; margin-bottom: 15px; }
        #current-role-title { font-family: var(--font-title); font-size: 1.6rem; color: var(--psg-red); text-transform: uppercase; }
        #current-role-subtitle { font-size: 0.9rem; color: #aaa; }
        .cards-grid { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; align-content: center; flex-grow: 1; }

        /* =========================================
           CARTES FUT (à droite)
        ========================================= */
        .fut-card { width: 120px; height: 175px; position: relative; border-radius: 8px 8px 25px 25px; display: flex; flex-direction: column; align-items: center; cursor: grab; box-shadow: 0 8px 15px rgba(0,0,0,0.6); transition: transform 0.2s, box-shadow 0.2s; overflow: hidden; border: 2px solid transparent; background-color: #1a1a1a; }
        .fut-card:hover { transform: translateY(-5px); box-shadow: 0 12px 20px rgba(0,0,0,0.8); }
        .fut-card::before { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(to bottom right, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 40%, rgba(255,255,255,0) 100%); transform: rotate(30deg); pointer-events: none; z-index: 2;}

        .fut-card.gold { background: linear-gradient(135deg, #FFDF00, #D4AF37, #996515); border-color: #FFF8DC; color: #332200; }
        .fut-card.silver { background: linear-gradient(135deg, #E0E0E0, #BDBDBD, #757575); border-color: #FFFFFF; color: #1a1a1a; }

        .card-top-left { position: absolute; top: 5px; left: 10px; font-size: 1.2rem; z-index: 3;}
        .card-image-container { width: 65px; height: 65px; border-radius: 50%; border: 2px solid rgba(255, 255, 255, 0.8); margin-top: 25px; overflow: hidden; background-color: #0A0A0A; display: flex; justify-content: center; align-items: center; z-index: 3;}
        .card-image-container img { width: 100%; height: 100%; object-fit: cover; object-position: top center; pointer-events: none; transition: opacity 0.3s; }
        .card-name { position: absolute; bottom: 15px; width: 100%; text-align: center; font-family: var(--font-title); font-size: 1rem; text-transform: uppercase; letter-spacing: 0.5px; padding: 0 5px; text-shadow: 1px 1px 2px rgba(255,255,255,0.5); z-index: 3;}

        /* =========================================
           JOUEUR SUR LE TERRAIN
        ========================================= */
        .dropped-player { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .dropped-player img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #fff; object-fit: cover; object-position: top center; box-shadow: 0 4px 8px rgba(0,0,0,0.6); background-color: #1a1a1a; }
        .dropped-player span { font-family: var(--font-title); font-size: 0.75rem; color: white; background: rgba(0, 0, 0, 0.8); padding: 2px 6px; border-radius: 4px; text-transform: uppercase; text-shadow: none; white-space: nowrap; position: relative; top: -10px; z-index: 4; }

        /* =========================================
           MODAL RATING IA (Style Glassmorphism/TikTok)
        ========================================= */
        #ai-rating-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 320px;
            background: rgba(15, 15, 15, 0.55);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 60px rgba(0,0,0,0.7), inset 0 0 0 1px rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 35px 20px;
            text-align: center;
            z-index: 200;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
        }

        #ai-rating-modal.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .ai-title {
            font-family: var(--font-title);
            color: var(--psg-red);
            font-size: 1.4rem;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(227, 6, 19, 0.5);
            margin-bottom: 10px;
        }

        .ai-score-container {
            display: flex;
            justify-content: center;
            align-items: baseline;
            margin: 15px 0;
        }

        .ai-score {
            font-family: var(--font-title);
            font-size: 5.5rem;
            color: #fff;
            text-shadow: 0 0 25px rgba(255, 255, 255, 0.4);
            line-height: 1;
        }

        .ai-percent {
            font-family: var(--font-title);
            font-size: 2rem;
            color: var(--psg-blue);
            margin-left: 5px;
        }

        .ai-rank {
            font-size: 1.3rem;
            font-weight: bold;
            letter-spacing: 1.5px;
            min-height: 1.5em;
            text-transform: uppercase;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
        }
        
        .ai-rank.reveal {
            opacity: 1;
            transform: translateY(0);
        }

        /* =========================================
           ANIMATIONS & MESSAGES
        ========================================= */
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(227, 6, 19, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(227, 6, 19, 0); } 100% { box-shadow: 0 0 0 0 rgba(227, 6, 19, 0); } }
        @keyframes flash-red { 0% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.1); filter: brightness(1.2) drop-shadow(0 0 10px var(--psg-red)); } 100% { transform: scale(1); filter: brightness(1); } }
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; border-color: var(--psg-red) !important; background-color: rgba(227, 6, 19, 0.4) !important; }
        @keyframes shake { 10%, 90% { transform: translate(-50%, -50%) translate3d(-2px, 0, 0); } 20%, 80% { transform: translate(-50%, -50%) translate3d(4px, 0, 0); } 30%, 50%, 70% { transform: translate(-50%, -50%) translate3d(-6px, 0, 0); } 40%, 60% { transform: translate(-50%, -50%) translate3d(6px, 0, 0); } }

        #end-message { position: absolute; top: 15%; left: 50%; transform: translate(-50%, -50%) scale(0); font-family: var(--font-title); font-size: 5rem; color: var(--text-light); text-shadow: 3px 3px 0px var(--psg-blue), 6px 6px 0px var(--psg-red); text-align: center; z-index: 100; pointer-events: none; opacity: 0; transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); white-space: nowrap; }
        #end-message.show { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        .dragging { opacity: 0.5; }
    </style>
</head>

            aiModal.classList.remove('show');
            document.getElementById('ai-rank').classList.remove('reveal');
            dropZones.forEach(zone => { zone.innerHTML = ''; zone.classList.remove('filled', 'active-target'); });
            renderStep();
        }

        function updateCounter() { counter.innerText = `${score} / 12`; }

        function renderStep() {
            if (currentIndex >= sequence.length) { triggerAIRating(); return; }
            const currentId = sequence[currentIndex];
            const data = playerData[currentId];
            
            dropZones.forEach(z => z.classList.remove('active-target'));
            document.getElementById(`drop-${currentId}`).classList.add('active-target');
            roleTitle.innerText = data.title;
            container.innerHTML = '';

            data.players.forEach((player, idx) => {
                const card = document.createElement('div');
                card.className = `fut-card ${player.type}`;
                card.draggable = true; card.dataset.index = idx;
                
                const avatarFallback = `https://ui-avatars.com/api/?name=${encodeURIComponent(player.name)}&background=1a1a1a&color=fff&size=150&bold=true`;

                card.innerHTML = `
                    <div class="card-top-left">${player.flag}</div>
                    <div class="card-image-container">
                        <img id="img-${currentId}-${idx}" src="${avatarFallback}" alt="${player.name}" draggable="false">
                    </div>
                    <div class="card-name">${player.name}</div>
                `;

                fetch(`https://fr.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(player.wikiQuery)}&prop=pageimages&format=json&pithumbsize=250&origin=*`)
                    .then(response => response.json())
                    .then(apiData => {
                        const pages = apiData.query.pages;
                        const pageId = Object.keys(pages)[0];
                        if (pageId !== "-1" && pages[pageId].thumbnail) {
                            document.getElementById(`img-${currentId}-${idx}`).src = pages[pageId].thumbnail.source;
                        }
                    })
                    .catch(err => console.log("Erreur API Wikipedia pour :", player.name));

                card.addEventListener('dragstart', function(e) {
                    this.classList.add('dragging'); 
                    selectedCardType = player.type; // On mémorise si c'est Gold ou Silver
                    
                    const currentImgSrc = this.querySelector('img').src;
                    
                    draggedCardHTML = `
                        <div class="dropped-player">
                            <img src="${currentImgSrc}" alt="${player.name}" draggable="false">
                            <span>${player.name}</span>
                        </div>
                    `;
                });
                
                card.addEventListener('dragend', function() { this.classList.remove('dragging'); });
                container.appendChild(card);
            });
        }

        dropZones.forEach(zone => {
            zone.addEventListener('dragover', e => { e.preventDefault(); });
            zone.addEventListener('drop', function(e) {
                e.preventDefault();
                const expectedId = sequence[currentIndex];
                const targetId = this.dataset.id;
                
                if (targetId === expectedId && draggedCardHTML) {
                    this.innerHTML = draggedCardHTML;
                    this.classList.add('filled'); 
                    this.classList.remove('active-target');
                    
                    // On compte les légendes (gold) pour la note finale
                    if (selectedCardType === 'gold') droppedGoldCount++;

                    score++; updateCounter(); currentIndex++; draggedCardHTML = null;
                    setTimeout(renderStep, 300);
                } else if (!this.classList.contains('filled')) {
                    this.classList.remove('shake'); void this.offsetWidth; this.classList.add('shake');
                    setTimeout(() => { this.classList.remove('shake'); }, 400);
                }
            });
        });

        /* =========================================
           SYSTÈME DE NOTATION IA (Façon TikTok)
        ========================================= */
        function triggerAIRating() {
            roleTitle.innerText = "CALCULATING...";
            container.innerHTML = '';
            
            // Calcul de la note : Base de 85. Chaque carte 'gold' ajoute +1. Max = 97.
            // Ça garantit une très bonne note (présentation valorisante) mais réagit aux choix.
            const finalScore = 85 + droppedGoldCount; 
            
            aiModal.classList.add('show');
            const scoreEl = document.getElementById('ai-score');
            const rankEl = document.getElementById('ai-rank');
            
            let currentNumber = 0;
            
            // Animation du compteur qui défile vite
            const interval = setInterval(() => {
                currentNumber += Math.floor(Math.random() * 5) + 2; // Incrémente de 2 à 6
                
                if (currentNumber >= finalScore) {
                    currentNumber = finalScore;
                    clearInterval(interval);
                    
                    // Attribution du rang
                    if (finalScore >= 95) {
                        rankEl.innerText = "S+ TIER : LÉGENDAIRE";
                        rankEl.style.color = "#FFDF00"; // Or
                    } else if (finalScore >= 90) {
                        rankEl.innerText = "S TIER : MASTERCLASS";
                        rankEl.style.color = "#E30613"; // Rouge PSG
                    } else {
                        rankEl.innerText = "A TIER : TRÈS SOLIDE";
                        rankEl.style.color = "#004170"; // Bleu PSG
                    }
                    
                    rankEl.classList.add('reveal');
                    
                    // On laisse la note visible 2.5 secondes puis on lance l'écran de fin
                    setTimeout(() => {
                        aiModal.classList.remove('show');
                        setTimeout(triggerVictory, 400); // Petit délai pour laisser le modal disparaître
                    }, 2500);
                }
                
                scoreEl.innerText = currentNumber;
            }, 30);
        }

        function triggerVictory() {
            roleTitle.innerText = "TEAM COMPLETE !"; 
            endMessage.classList.add('show');
            const end = Date.now() + 3 * 1000; const colors = ['#004170', '#E30613'];
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: colors });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: colors });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        document.getElementById('btn-reset').addEventListener('click', init);
        init();
    </script>
</body>
</html>
